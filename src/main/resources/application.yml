    #     enabled: true
    #     sse:
    #       connections:
    #         filesystem-server:
    #           url: http://localhost:3001/sse

# ===== Glow custom config =====
glow:
  # ===== Multi-model providers =====
  models:
    kimi:
      api-key: ${KIMI_API_KEY:}
      base-url: https://api.moonshot.cn/v1
      model: moonshot-v1-8k          # options: moonshot-v1-8k / moonshot-v1-32k / moonshot-v1-128k
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-chat
  chat:
    memory:
      window-size: 20       # how many messages to keep in context
  rag:
    top-k: 5                # top-K documents to retrieve
    similarity-threshold: 0.7
  safety:
    blocked-keywords: "bomb,weapon,hack,exploit"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.glow: DEBUG
    org.springframework.ai: INFO
