spring:
  application:
    name: glow

  # ===== Module 1/2/3/4/6/7/8/9: OpenAI =====
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          max-tokens: 2048
      image:
        options:
          model: dall-e-3
          size: 1024x1024
          quality: standard
          response-format: url
      audio:
        transcription:
          options:
            model: whisper-1
            language: zh
        speech:
          options:
            model: tts-1
            voice: alloy

    # ===== Optional: Anthropic Claude =====
    # anthropic:
    #   api-key: ${ANTHROPIC_API_KEY:}
    #   chat:
    #     options:
    #       model: claude-3-5-sonnet-20241022

    # ===== Optional: Ollama (local) =====
    # ollama:
    #   base-url: http://localhost:11434
    #   chat:
    #     options:
    #       model: llama3.2

    # ===== Module 5: RAG — PgVector (uncomment for production) =====
